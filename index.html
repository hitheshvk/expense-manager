    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fff;color:#3c4257}
    input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield}
    button,a{transition:color .12s ease,background .12s ease,opacity .12s ease}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeSlide .18s ease-out}
    .row-done{background:#f8fffe}
    .row-done .item-name{color:#a3acb9;text-decoration:line-through;text-decoration-color:#c1c9d280;text-decoration-thickness:1px}
    @keyframes micPulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}
    .mic-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid #635bff;animation:micPulse 1.4s ease-out infinite}
    @keyframes barSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .cmd-bar{animation:barSlide .18s ease-out}
    *:focus-visible{outline:2px solid #635bff;outline-offset:2px;border-radius:4px}
    th:focus-visible,td:focus-visible{border-radius:0}
    .drag-handle{opacity:0;cursor:grab;transition:opacity .12s ease;color:#c1c9d2;display:flex;align-items:center;padding:0 2px}
    .drag-handle:active{cursor:grabbing}
    tr:hover .drag-handle,tr:focus-within .drag-handle{opacity:1}
    tr[draggable=true]{cursor:default}
    tr.dragging{opacity:.35}
    .drag-over{background:rgba(99,91,255,.04)}
    .child-row td:first-child{padding-left:12px}
    .child-indent{padding-left:20px}
    @keyframes toastIn{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-6px) scale(.98)}}
    .toast-enter{animation:toastIn .22s cubic-bezier(.21,1.02,.73,1) forwards}
    .toast-exit{animation:toastOut .16s ease-in forwards}
  </style>
</head>

/* ── Apple iOS-style Icon Component ── */
function D3({g,d,sz=52}){
  const r=sz*.2237,ic=sz*.46;
  return<div className="relative shrink-0" style={{width:sz,height:sz}}>
    <div style={{position:'absolute',inset:0,borderRadius:r,
      background:`linear-gradient(160deg,${g[0]} 0%,${g[1]} 55%,${g[0]}dd 100%)`,
      boxShadow:`0 ${sz*.18}px ${sz*.36}px -${sz*.06}px ${g[0]}55, 0 ${sz*.05}px ${sz*.1}px rgba(0,0,0,0.12), inset 0 1px 1px rgba(255,255,255,0.25), inset 0 -1px 1px rgba(0,0,0,0.12)`
    }}/>
    <div style={{position:'absolute',top:0,left:0,right:0,height:'44%',
      borderRadius:`${r}px ${r}px ${r*.4}px ${r*.4}px`,
      background:'linear-gradient(180deg,rgba(255,255,255,0.42) 0%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0) 100%)'
    }}/>
    <div style={{position:'absolute',inset:.5,borderRadius:r-.5,border:'0.5px solid rgba(255,255,255,0.2)',pointerEvents:'none'}}/>
    <div className="absolute inset-0 flex items-center justify-center">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={1.9} strokeLinecap="round" strokeLinejoin="round"
        style={{width:ic,height:ic,filter:'drop-shadow(0 1px 2px rgba(0,0,0,0.3))'}}>
        {(Array.isArray(d)?d:[d]).map((p,i)=><path key={i} d={p}/>)}
      </svg>
    </div>
  </div>
}

/* ── Safe math expression evaluator ── */
function evalMath(expr){
  const s=String(expr).replace(/,/g,'').replace(/₹/g,'').trim();
  if(!s)return NaN;
  if(/^[\d.]+$/.test(s))return parseFloat(s);
  if(!/^[\d\s+\-*/.()]+$/.test(s))return NaN;
  try{return Function('"use strict";return('+s+')')()}catch(e){return NaN}
}

/* ── Editable Field ── */
function E({value,onSave,type='text',options,render,ph,cls='',iCls=''}){
  const[on,setOn]=useState(false);const[d,setD]=useState(value);const ref=useRef(null);
  useEffect(()=>{if(!on)setD(value)},[value,on]);
  useEffect(()=>{if(on&&ref.current){ref.current.focus();if(ref.current.select&&type!=='select')ref.current.select()}},[on]);
  const save=()=>{
    if(type==='number'){const v=Math.max(0,Math.round(evalMath(d))||0);if(v!==value)onSave(v);setOn(false);return}
    const v=(d??'').toString();if(v!==value)onSave(v);setOn(false);
  };
  if(!on){const disp=render?render(value):(value===''||value==null?(ph||'—'):String(value));return<span role="button" tabIndex={0} onClick={()=>{setD(value);setOn(true)}} onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setD(value);setOn(true)}}} className={`cursor-pointer border-b border-dashed border-transparent hover:border-[#a3acb9] inline-block ${cls}`} style={{transition:'border-color .12s ease'}} aria-label={`Edit ${ph||'value'}: ${value}`}>{disp}</span>}
  if(type==='select')return<select ref={ref} value={d} onChange={e=>{onSave(e.target.value);setOn(false)}} onBlur={()=>setOn(false)} className={`border rounded px-2 py-1 text-[13px] bg-white focus:outline-none focus:ring-2 focus:ring-[#635bff]/20 focus:border-[#635bff] fade-in ${iCls}`} style={{borderColor:'#e3e8ee'}}>{(options||[]).map(o=><option key={o} value={o}>{o||'—'}</option>)}</select>;
  return<input ref={ref} type="text" inputMode={type==='number'?'decimal':'text'} value={d} onChange={e=>setD(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setD(value);setOn(false)}}} placeholder={type==='number'?'e.g. 50000+30000':(ph||'')} className={`border rounded px-2 py-1 text-[13px] bg-white focus:outline-none focus:ring-2 focus:ring-[#635bff]/20 focus:border-[#635bff] fade-in ${iCls}`} style={{borderColor:'#e3e8ee'}}/>
}

/* ── Command Parser ── */
function parseCmd(raw){
  const t=raw.toLowerCase().replace(/[.,!?]+$/,'').trim();
  const xAmt=s=>{
    s=s.replace(/₹|rupees?|rs\.?/gi,'').replace(/,/g,'');
    let m;
    if(m=s.match(/([\d.]+)\s*(?:lakh|lakhs|lac)/i))return Math.round(parseFloat(m[1])*1e5);
    if(m=s.match(/([\d.]+)\s*(?:thousand|k)\b/i))return Math.round(parseFloat(m[1])*1e3);
    const ns=[...s.matchAll(/\d[\d.]*/g)];
    if(ns.length)return Math.round(parseFloat(ns[ns.length-1][0]));
    return null;
  };
  const strip=s=>s.replace(/₹|rupees?|rs\.?/gi,'').replace(/\d[\d,.]*\s*(?:lakh|lakhs|lac|thousand|k)?\s*/gi,'').replace(/\b(for|of|at|to|in|the|a|an)\b/gi,'').replace(/\s+/g,' ').trim();

  if(/^(add|new|create)\s/i.test(t)){
    const rest=t.replace(/^(add|new|create)\s+/i,'');
    const amt=xAmt(rest);const name=strip(rest);
    const cat=CATS.find(c=>rest.includes(c.toLowerCase()))||'Other';
    return{action:'add',name,cost:amt||0,cat};
  }
  if(/^(paid|pay)\s/i.test(t)||(/\bmark\b/i.test(t)&&/\bpaid\b/i.test(t))){
    if(/\bmark\b/i.test(t)&&/\bpaid\b/i.test(t))
      return{action:'markPaid',name:t.replace(/\bmark\b/i,'').replace(/\bas\s+paid\b/i,'').replace(/\bpaid\b/i,'').replace(/\b(the|a|an)\b/gi,'').trim()};
    const amt=xAmt(t);const name=strip(t.replace(/^(paid|pay)\s+/i,''));
    return{action:'paid',name,amount:amt};
  }
  if(/^(remove|delete)\s/i.test(t))return{action:'remove',name:t.replace(/^(remove|delete)\s+/i,'').replace(/\b(the|a|an)\b/gi,'').trim()};
  if(/^(nest|move)\s/i.test(t)){
    const parts=t.replace(/^(nest|move)\s+/i,'').split(/\s+(under|into|to)\s+/i);
    if(parts.length>=2)return{action:'nest',childName:parts[0].trim(),parentName:parts[parts.length-1].trim()};
    return{action:'unknown',text:t};
  }
  if(/^(detach|pull out|separate)\s/i.test(t))return{action:'detach',name:t.replace(/^(detach|pull out|separate)\s+/i,'').replace(/\b(the|a|an)\b/gi,'').trim()};
  if(/^(set|change|update)\s/i.test(t)){
    const amt=xAmt(t);const field=t.replace(/^(set|change|update)\s+/i,'').replace(/\s+(to|at)\s+.*/i,'').trim();
    return{action:'set',field,amount:amt};
  }
  const amt=xAmt(t);
  if(amt&&amt>0){const name=strip(t);if(name)return{action:'add',name,cost:amt,cat:'Other'}}
  return{action:'unknown',text:t};
}

function App(){
  const[items,setItems]=useP('items',SEED);
  const[filter,setFilter]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  const[del,setDel]=useState(null);

  const[bl,setBl]=useP('bl',{amount:900000,rate:11,tenure:24});
  const[japan,setJapan]=useP('japan',400000);
  
  const[dragId,setDragId]=useState(null);
  const[dropTarget,setDropTarget]=useState(null);
  const[expanded,setExpanded]=useState(new Set());
  const didDrop=useRef(false);
  const[toasts,setToasts]=useState([]);

  const toast=(msg,type='info')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type,exit:false}]);

      setToasts(p=>p.map(t=>t.id===id?{...t,exit:true}:t));
      setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),220);
    },2800);
  };
  const dismissToast=id=>{
    clearTimeout(toastTimer.current[id]);
    setToasts(p=>p.map(t=>t.id===id?{...t,exit:true}:t));
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),220);
  };

  const upd=(id,k,v)=>setItems(p=>p.map(i=>i.id===id?{...i,[k]:v}:i));
  const rm=id=>{const itm=items.find(i=>i.id===id);setItems(p=>p.filter(i=>i.id!==id).map(i=>i.parentId===id?{...i,parentId:null}:i));setDel(null);if(itm)toast(`"${itm.name}" removed`,'remove')};
  const add=()=>{if(!nw.name.trim()||!nw.cost)return;const id=Math.max(0,...items.map(i=>i.id))+1;const name=nw.name.trim();setItems(p=>[...p,{id,cat:nw.cat,name,cost:Math.round(evalMath(nw.cost))||0,paid:Math.round(evalMath(nw.paid))||0,src:nw.src,notes:'',parentId:null}]);setNw({name:'',cost:'',paid:'',cat:'Other',src:''});setShowAdd(false);toast(`"${name}" added`,'add')};

  const childrenOf=pid=>items.filter(i=>i.parentId===pid);
  const hasChildren=pid=>items.some(i=>i.parentId===pid);
  const toggleExpand=id=>setExpanded(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});
  const makeChild=(childId,parentId)=>{
    if(childId===parentId)return;
    if(hasChildren(childId))return;
    const target=items.find(i=>i.id===parentId);
    if(!target)return;
    const child=items.find(i=>i.id===childId);
    const realParent=target.parentId||parentId;
    setItems(p=>p.map(i=>i.id===childId?{...i,parentId:realParent}:i));
    const pName=(items.find(i=>i.id===realParent)||target).name;
    if(child)toast(`"${child.name}" moved under "${pName}"`,'nest');
  };
  const detachChild=id=>{const itm=items.find(i=>i.id===id);setItems(p=>p.map(i=>i.id===id?{...i,parentId:null}:i));if(itm)toast(`"${itm.name}" is now standalone`,'detach')};

  const bankEmi=useMemo(()=>Math.round(calcEMI(bl.amount,bl.rate,bl.tenure)),[bl]);
  const fixedTotal=cf.rent+cf.sendHome+cf.homeLoanEmi+cf.living;
  const surplus=cf.income-fixedTotal-cf.sip-bankEmi-fl.repay;
  const friendMo=fl.repay>0?Math.ceil(fl.outstanding/fl.repay):null;
  const japanMo=surplus>0?Math.ceil(japan/surplus):null;
  

  const topLevel=useMemo(()=>items.filter(i=>!i.parentId),[items]);
  const t=useMemo(()=>{
    const b=topLevel.reduce((s,i)=>s+i.cost,0);
    const p=topLevel.reduce((s,i)=>{const ch=childrenOf(i.id);return s+(ch.length>0?ch.reduce((a,c)=>a+c.paid,0):i.paid)},0);
    return{b,p,pend:b-p,paid_n:topLevel.filter(i=>i.paid>=i.cost).length,partial_n:topLevel.filter(i=>i.paid>0&&i.paid<i.cost).length,pending_n:topLevel.filter(i=>i.paid===0).length}
  },[items,topLevel]);

  const maxCat=byCat.length>0?byCat[0][1].cost:1;

  const pct=t.b>0?t.p/t.b*100:0;

  const exportCSV=()=>{const h='Item,Category,Cost,Paid,Pending,Source,Notes\n';const rows=items.map(i=>`"${i.name}","${i.cat}",${i.cost},${i.paid},${Math.max(0,i.cost-i.paid)},"${i.src}","${i.notes}"`).join('\n');const b=new Blob([h+rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finance-planner.csv';a.click()};

  const exportJSON=()=>{

      }catch(err){alert('Invalid backup file')}

  const lastSaved=useMemo(()=>{try{return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}catch(e){return''}},[items,cf,fl,bl,japan]);

  /* ── Voice / Command Bar ── */

      }
      case'remove':{
        const it=findItem(cmd.name);if(!it)return{msg:`Can't find "${cmd.name}"`,ok:false};
        rm(it.id);return{msg:`Removed "${it.name}"`,ok:true};
      }
      case'set':{
        const fm={'rent':'rent','salary':'income','income':'income','send home':'sendHome','home loan':'homeLoanEmi','living':'living','sip':'sip','mutual fund':'sip'};
        const k=Object.keys(fm).find(k=>cmd.field?.includes(k));
        if(k&&cmd.amount){setCf(p=>({...p,[fm[k]]:cmd.amount}));return{msg:`Set ${k} to ${fmt(cmd.amount)}`,ok:true}}

      case'nest':{
        const child=findItem(cmd.childName),parent=findItem(cmd.parentName);

        <div className="flex-1 min-w-[160px]">
          <label className="block text-[12px] font-medium mb-1" style={{color:'#697386'}}>Item name</label>
          <input ref={addRef} type="text" value={nw.name} onChange={e=>setNw({...nw,name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="e.g. Rent, Groceries" className="w-full rounded-md px-3 py-2 text-[14px] focus:outline-none focus:ring-2 focus:ring-[#635bff]/20 focus:border-[#635bff] placeholder:text-[#c1c9d2]" style={{border:'1px solid #d8dee4',background:'#fff'}}/>
        </div>
        <div className="w-32">
          <label className="block text-[12px] font-medium mb-1" style={{color:'#697386'}}>Cost</label>
          <input type="text" inputMode="decimal" value={nw.cost} onChange={e=>setNw({...nw,cost:e.target.value})} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="50000" className="w-full rounded-md px-3 py-2 text-[14px] focus:outline-none focus:ring-2 focus:ring-[#635bff]/20 focus:border-[#635bff] placeholder:text-[#c1c9d2]" style={{border:'1px solid #d8dee4',background:'#fff'}}/>
        </div>
        <div className="w-32">
          <label className="block text-[12px] font-medium mb-1" style={{color:'#697386'}}>Paid</label>
          <input type="text" inputMode="decimal" value={nw.paid} onChange={e=>setNw({...nw,paid:e.target.value})} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="0" className="w-full rounded-md px-3 py-2 text-[14px] focus:outline-none focus:ring-2 focus:ring-[#635bff]/20 focus:border-[#635bff] placeholder:text-[#c1c9d2]" style={{border:'1px solid #d8dee4',background:'#fff'}}/>
        </div>
        <div className="w-28">
          <label className="block text-[12px] font-medium mb-1" style={{color:'#697386'}}>Category</label>
          <select value={nw.cat} onChange={e=>setNw({...nw,cat:e.target.value})} className="w-full rounded-md px-2 py-2 text-[14px] focus:outline-none focus:ring-2 focus:ring-[#635bff]/20 focus:border-[#635bff]" style={{border:'1px solid #d8dee4',background:'#fff'}}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
        </div>
        <button onClick={add} className="rounded-md px-4 py-2 text-[13px] font-medium transition hover:opacity-90" style={{backgroundColor:'#635bff',color:'white'}}>Add</button>
      </div>}

      {/* ═══ ITEMS TABLE ═══ */}
      <div className="rounded-md overflow-hidden" style={{border:'1px solid #e3e8ee'}}>
        <div className="overflow-x-auto">
          <table className="w-full text-[14px]">
            <thead><tr style={{borderBottom:'1px solid #e3e8ee',background:'#fafbfc'}}>
              <th className="w-6 py-2.5 pl-3"></th>
              <th className="text-left font-medium py-2.5 pl-1 pr-3 text-[12px] uppercase tracking-wider" style={{color:'#8792a2'}}>Item</th>
              <th className="text-left font-medium py-2.5 px-3 text-[12px] uppercase tracking-wider hidden sm:table-cell" style={{color:'#8792a2'}}>Category</th>
              <th className="text-right font-medium py-2.5 px-3 text-[12px] uppercase tracking-wider" style={{color:'#8792a2'}}>Cost</th>
              <th className="text-right font-medium py-2.5 px-3 text-[12px] uppercase tracking-wider" style={{color:'#8792a2'}}>Paid</th>
              <th className="text-right font-medium py-2.5 px-3 text-[12px] uppercase tracking-wider" style={{color:'#8792a2'}}>Pending</th>
              <th className="text-left font-medium py-2.5 px-3 text-[12px] uppercase tracking-wider hidden lg:table-cell" style={{color:'#8792a2'}}>Source</th>
              <th className="py-2.5 pr-4 pl-3 w-8"></th>
            </tr></thead>
            <tbody>
            {filtered.map(item=>{
              const ch=childrenOf(item.id);const isParent=ch.length>0;const isExp=expanded.has(item.id);
              const chSpent=ch.reduce((s,c)=>s+c.cost,0);const chPaid=ch.reduce((s,c)=>s+c.paid,0);
              const dispPaid=isParent?chPaid:item.paid;const dispPend=isParent?Math.max(0,item.cost-chSpent):Math.max(0,item.cost-item.paid);
              const done=isParent?(chSpent>=item.cost&&item.cost>0):(item.paid>=item.cost);
              const partial=isParent?(chSpent>0&&chSpent<item.cost):(item.paid>0&&item.paid<item.cost);
              const canDrag=!isParent;
              return<React.Fragment key={item.id}>
                <tr
                  draggable={canDrag?"true":undefined}
                  className={`group ${done?'row-done':'hover:bg-[#fafbfc]'} ${dragId===item.id?'dragging':''} ${dropTarget===item.id?'drag-over':''}`}
                  onDragStart={canDrag?e=>{setDragId(item.id);didDrop.current=false;e.dataTransfer.effectAllowed='move'}:undefined}
                  onDragEnd={()=>{const id=dragId;const wasDrop=didDrop.current;setDragId(null);setDropTarget(null);if(!wasDrop&&id){const itm=items.find(i=>i.id===id);if(itm&&itm.parentId)detachChild(id)}}}
                  onDragOver={e=>{if(!dragId||dragId===item.id)return;e.preventDefault();setDropTarget(item.id)}}
                  onDragLeave={()=>setDropTarget(null)}
                  onDrop={e=>{e.preventDefault();didDrop.current=true;if(dragId&&dragId!==item.id){makeChild(dragId,item.id)}setDragId(null);setDropTarget(null)}}
                  style={{borderBottom:'1px solid #f0f2f5',transition:'background .12s ease'}}>
                  <td className="py-2.5 pl-3">
                    {canDrag?<span className="drag-handle"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.2"/><circle cx="11" cy="3" r="1.2"/><circle cx="5" cy="8" r="1.2"/><circle cx="11" cy="8" r="1.2"/><circle cx="5" cy="13" r="1.2"/><circle cx="11" cy="13" r="1.2"/></svg></span>
                    :<span className="w-3"/>}
                  </td>
                  <td className="py-2.5 pl-1 pr-3">
                    <div className="flex items-center gap-1.5">
                      {isParent&&<button onClick={()=>toggleExpand(item.id)} className="flex items-center justify-center w-5 h-5 rounded transition hover:bg-gray-100" aria-label={isExp?'Collapse':'Expand'}>
                        <svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill="#8792a2" style={{transform:isExp?'rotate(90deg)':'rotate(0deg)',transition:'transform .12s ease'}}><path fillRule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clipRule="evenodd"/></svg>
                      </button>}
                      {!isParent&&done&&<svg viewBox="0 0 20 20" fill="#3ecf8e" className="w-4 h-4 shrink-0"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clipRule="evenodd"/></svg>}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <E value={item.name} onSave={v=>upd(item.id,'name',v)} cls={`font-medium text-[14px] ${done?'item-name':''}`} ph="Item name"/>
                          {isParent&&<span className="text-[11px] font-medium px-1.5 py-0.5 rounded shrink-0" style={{color:'#635bff',background:'#f5f3ff'}}>{ch.length}</span>}
                        </div>
                        {item.notes&&<span className="block text-[12px] mt-0.5 truncate max-w-xs" style={{color:'#8792a2'}}>{item.notes}</span>}
                        {isParent&&!isExp&&<span className="block text-[12px] mt-0.5 truncate" style={{color:'#a3acb9'}}>{ch.map(c=>c.name).join(', ')}</span>}
                      </div>
                    </div>
                  </td>
                  <td className="py-2.5 px-3 hidden sm:table-cell"><E value={item.cat} onSave={v=>upd(item.id,'cat',v)} type="select" options={CATS} render={v=><span className="inline-flex items-center gap-1.5 text-[12px] font-medium px-2 py-0.5 rounded" style={{color:'#3c4257',background:'#f0f2f5'}}><svg className="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="#8792a2" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">{(Array.isArray(CI[v])?CI[v]:[CI[v]||CI.Other]).map((p,i)=><path key={i} d={p}/>)}</svg>{v}</span>}/></td>
                  <td className="text-right py-2.5 px-3"><E value={item.cost} onSave={v=>upd(item.id,'cost',v)} type="number" render={fmt} cls="tabular-nums" iCls="w-24 text-right"/></td>
                  <td className="text-right py-2.5 px-3">{isParent
                    ?<span className="tabular-nums" style={{color:chPaid>0?'#3ecf8e':'#c1c9d2',fontWeight:chPaid>0?500:400}}>{fmt(chPaid)}</span>
                    :<E value={item.paid} onSave={v=>upd(item.id,'paid',Math.min(v,item.cost))} type="number" render={v=><span style={{color:v>0?'#3ecf8e':'#c1c9d2',fontWeight:v>0?500:400}}>{fmt(v)}</span>} cls="tabular-nums" iCls="w-24 text-right"/>}</td>
                  <td className="text-right py-2.5 px-3 tabular-nums font-medium">{done?<span className="text-[12px] font-medium" style={{color:'#3ecf8e'}}>Cleared</span>:<span style={{color:partial?'#e8b73a':'#e56f4a'}}>{fmt(dispPend)}</span>}</td>
                  <td className="py-2.5 px-3 hidden lg:table-cell">{!isParent&&<E value={item.src} onSave={v=>upd(item.id,'src',v)} type="select" options={SRCS} render={v=>v?<span className="text-[13px]" style={{color:'#8792a2'}}>{v}</span>:<span className="text-[13px]" style={{color:'#c1c9d2'}}>—</span>}/>}</td>
                  <td className="py-2.5 pr-4 pl-3 text-right">{del===item.id
                    ?<span className="inline-flex gap-1.5 text-[12px] whitespace-nowrap"><button onClick={()=>rm(item.id)} className="font-medium" style={{color:'#e56f4a'}}>Yes</button><span style={{color:'#e3e8ee'}}>/</span><button onClick={()=>setDel(null)} style={{color:'#8792a2'}}>No</button></span>
                    :<button onClick={()=>setDel(item.id)} className="opacity-0 group-hover:opacity-100 focus:opacity-100" style={{color:'#c1c9d2',transition:'opacity .15s ease, color .12s ease'}} onMouseOver={e=>e.currentTarget.style.color='#e56f4a'} onMouseOut={e=>e.currentTarget.style.color='#c1c9d2'} aria-label={`Delete ${item.name}`}>
                      <svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"/></svg>
                    </button>}</td>
                </tr>
                {isParent&&isExp&&ch.map(c=>{const cPend=Math.max(0,c.cost-c.paid);const cDone=c.paid>=c.cost;const cPartial=c.paid>0&&c.paid<c.cost;
                  return<tr key={c.id} draggable="true"
                    className={`group child-row ${cDone?'row-done':'hover:bg-[#fafbfc]'} ${dragId===c.id?'dragging':''}`}
                    onDragStart={e=>{setDragId(c.id);didDrop.current=false;e.dataTransfer.effectAllowed='move'}}
                    onDragEnd={()=>{const wasDrop=didDrop.current;setDragId(null);setDropTarget(null);if(!wasDrop)detachChild(c.id)}}
                    style={{borderBottom:'1px solid #f5f6f8',transition:'background .12s ease'}}>
                    <td className="py-2 pl-3"><span className="drag-handle"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.2"/><circle cx="11" cy="3" r="1.2"/><circle cx="5" cy="8" r="1.2"/><circle cx="11" cy="8" r="1.2"/><circle cx="5" cy="13" r="1.2"/><circle cx="11" cy="13" r="1.2"/></svg></span></td>
                    <td className="py-2 pl-1 pr-3">
                      <div className="flex items-center gap-2 child-indent">
                        {cDone&&<svg viewBox="0 0 20 20" fill="#3ecf8e" className="w-3.5 h-3.5 shrink-0"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clipRule="evenodd"/></svg>}
                        <E value={c.name} onSave={v=>upd(c.id,'name',v)} cls={`text-[13px] ${cDone?'item-name':''}`} ph="Sub-item"/>
                      </div>
                    </td>
                    <td className="py-2 px-3 hidden sm:table-cell"></td>
                    <td className="text-right py-2 px-3 text-[13px]"><E value={c.cost} onSave={v=>upd(c.id,'cost',v)} type="number" render={fmt} cls="tabular-nums" iCls="w-20 text-right"/></td>
                    <td className="text-right py-2 px-3 text-[13px]"><E value={c.paid} onSave={v=>upd(c.id,'paid',Math.min(v,c.cost))} type="number" render={v=><span style={{color:v>0?'#3ecf8e':'#c1c9d2'}}>{fmt(v)}</span>} cls="tabular-nums" iCls="w-20 text-right"/></td>
                    <td className="text-right py-2 px-3 text-[13px] tabular-nums">{cDone?<span className="font-medium" style={{color:'#3ecf8e',fontSize:11}}>Cleared</span>:<span style={{color:cPartial?'#e8b73a':'#e56f4a'}}>{fmt(cPend)}</span>}</td>
                    <td className="py-2 px-3 hidden lg:table-cell"><E value={c.src} onSave={v=>upd(c.id,'src',v)} type="select" options={SRCS} render={v=>v?<span className="text-[12px]" style={{color:'#a3acb9'}}>{v}</span>:<span className="text-[12px]" style={{color:'#d1d5db'}}>—</span>}/></td>
                    <td className="py-2 pr-4 pl-3 text-right">
                      <div className="flex items-center gap-1 justify-end">
                        <button onClick={()=>detachChild(c.id)} className="opacity-0 group-hover:opacity-100 focus:opacity-100" style={{color:'#c1c9d2',transition:'opacity .15s ease'}} title="Pull out" aria-label={`Detach ${c.name}`}>
                          <svg className="w-3 h-3" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>
                        </button>
                        {del===c.id
                          ?<span className="inline-flex gap-1.5 text-[12px] whitespace-nowrap"><button onClick={()=>rm(c.id)} className="font-medium" style={{color:'#e56f4a'}}>Del?</button><span style={{color:'#e3e8ee'}}>/</span><button onClick={()=>setDel(null)} style={{color:'#8792a2'}}>No</button></span>
                          :<button onClick={()=>setDel(c.id)} className="opacity-0 group-hover:opacity-100 focus:opacity-100" style={{color:'#c1c9d2',transition:'opacity .15s ease, color .12s ease'}} onMouseOver={e=>e.currentTarget.style.color='#e56f4a'} onMouseOut={e=>e.currentTarget.style.color='#c1c9d2'} aria-label={`Delete ${c.name}`}>
                            <svg className="w-3 h-3" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"/></svg>
                          </button>}
                      </div>
                    </td>
                  </tr>})}
              </React.Fragment>
            })}
            </tbody>
            <tfoot><tr className="font-medium text-[13px]" style={{borderTop:'1px solid #e3e8ee',background:'#fafbfc',color:'#1a1f36'}}>
              <td className="py-2.5 pl-3"></td>
              <td className="py-2.5 pl-1 pr-3">Total ({filtered.length})</td>
              <td className="hidden sm:table-cell"></td>
              <td className="text-right py-2.5 px-3 tabular-nums">{fmt(filtered.reduce((s,i)=>s+i.cost,0))}</td>
              <td className="text-right py-2.5 px-3 tabular-nums" style={{color:'#3ecf8e'}}>{fmt(filtered.reduce((s,i)=>{const ch=childrenOf(i.id);return s+(ch.length>0?ch.reduce((a,c)=>a+c.paid,0):i.paid)},0))}</td>
              <td className="text-right py-2.5 px-3 tabular-nums" style={{color:'#e56f4a'}}>{fmt(filtered.reduce((s,i)=>{const ch=childrenOf(i.id);return s+(ch.length>0?Math.max(0,i.cost-ch.reduce((a,c)=>a+c.cost,0)):Math.max(0,i.cost-i.paid))},0))}</td>
              <td colSpan={2}></td>
            </tr></tfoot>
          </table>
        </div>
      </div>
      <p className="text-[12px] mt-2 mb-8" style={{color:'#a3acb9'}}>Drag rows to nest &middot; Click values to edit &middot; <kbd className="px-1 py-0.5 rounded text-[11px]" style={{background:'#f0f2f5',color:'#8792a2'}}>⌘K</kbd> commands</p>

      {/* ═══ FINANCES ═══ */}
      <div className="pt-6" style={{borderTop:'1px solid #e3e8ee'}}>
        <p className="text-[12px] font-medium uppercase tracking-wider mb-4" style={{color:'#8792a2'}}>Cash Flow, Loans & Goals</p>
        <div className="grid lg:grid-cols-2 gap-5">
          <div className="rounded-md overflow-hidden" style={{border:'1px solid #e3e8ee'}}>
            <div className="px-4 py-2.5" style={{borderBottom:'1px solid #e3e8ee',background:'#fafbfc'}}><p className="text-[12px] font-medium uppercase tracking-wider" style={{color:'#8792a2'}}>Monthly Cash Flow</p></div>
            <div>
              <div className="flex justify-between items-center py-3 px-4" style={{borderBottom:'1px solid #f0f2f5'}}>
                <span className="text-[14px]" style={{color:'#3c4257'}}>Salary</span>
                <E value={cf.income} onSave={v=>setCf(p=>({...p,income:v}))} type="number" render={v=><span className="font-medium" style={{color:'#3ecf8e'}}>{fmt(v)}</span>} cls="tabular-nums text-[14px]" iCls="w-28 text-right"/>
              </div>
              {[{l:'Rent',k:'rent'},{l:'Send Home',k:'sendHome'},{l:'Home Loan EMI',k:'homeLoanEmi'},{l:'Living Expenses',k:'living'},{l:'Mutual Fund SIP',k:'sip'}].map(r=>
                <div key={r.k} className="flex justify-between items-center py-3 px-4" style={{borderBottom:'1px solid #f0f2f5'}}>
                  <span className="text-[14px]" style={{color:'#3c4257'}}>{r.l}</span>
                  <E value={cf[r.k]} onSave={v=>setCf(p=>({...p,[r.k]:v}))} type="number" render={v=><span style={{color:'#3c4257'}}>-{fmt(v)}</span>} cls="tabular-nums text-[14px]" iCls="w-28 text-right"/>
                </div>
              )}
              <div className="flex justify-between items-center py-3 px-4" style={{borderBottom:'1px solid #f0f2f5'}}>
                <span className="text-[14px]" style={{color:'#8792a2'}}>Bank Loan EMI</span>
                <span className="text-[14px] tabular-nums" style={{color:'#8792a2'}}>-{fmt(bankEmi)}</span>
              </div>
              <div className="flex justify-between items-center py-3 px-4" style={{borderBottom:'1px solid #f0f2f5'}}>
                <span className="text-[14px]" style={{color:'#8792a2'}}>Friend Loan Repay</span>
                <span className="text-[14px] tabular-nums" style={{color:'#8792a2'}}>-{fmt(fl.repay)}</span>
              </div>
              <div className="flex justify-between items-center py-3 px-4" style={{background:surplus>=0?'#f8fffe':'#fef8f6'}}>
                <span className="text-[14px] font-semibold" style={{color:'#1a1f36'}}>Net Surplus</span>
                <span className="text-[18px] font-semibold tabular-nums" style={{color:surplus>=0?'#3ecf8e':'#e56f4a'}}>{fmt(surplus)}</span>
              </div>
            </div>
          </div>

          <div className="rounded-md overflow-hidden" style={{border:'1px solid #e3e8ee'}}>
            <div className="px-4 py-2.5" style={{borderBottom:'1px solid #e3e8ee',background:'#fafbfc'}}><p className="text-[12px] font-medium uppercase tracking-wider" style={{color:'#8792a2'}}>Debt & Savings Goals</p></div>
            <div className="px-4 py-3.5" style={{borderBottom:'1px solid #f0f2f5'}}>
              <div className="flex items-center gap-2 mb-2.5">
                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#697386" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <p className="text-[12px] font-medium uppercase tracking-wider" style={{color:'#8792a2'}}>Friend Loan — Nishal</p>
              </div>
              <div className="flex justify-between items-center mb-1"><span className="text-[14px]" style={{color:'#3c4257'}}>Outstanding</span><E value={fl.outstanding} onSave={v=>setFl(p=>({...p,outstanding:v}))} type="number" render={v=><span className="font-medium" style={{color:'#e56f4a'}}>{fmt(v)}</span>} cls="tabular-nums text-[14px]" iCls="w-28 text-right"/></div>
              <div className="flex justify-between items-center mb-1"><span className="text-[14px]" style={{color:'#3c4257'}}>Repay / month</span><E value={fl.repay} onSave={v=>setFl(p=>({...p,repay:v}))} type="number" render={fmt} cls="tabular-nums text-[14px] font-medium" iCls="w-28 text-right"/></div>
              {friendMo&&<p className="text-[12px] mt-1.5" style={{color:'#8792a2'}}>Cleared in {friendMo} months ({(()=>{const d=new Date();d.setMonth(d.getMonth()+friendMo);return d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})})()})</p>}
            </div>
            <div className="px-4 py-3.5" style={{borderBottom:'1px solid #f0f2f5'}}>
              <div className="flex items-center gap-2 mb-2.5">
                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#697386" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.25m0 0v-.468c0-.824.57-1.575 1.382-1.76a48.959 48.959 0 0115.736 0c.811.185 1.382.936 1.382 1.76v.468m-18.5 0h18.5"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <p className="text-[12px] font-medium uppercase tracking-wider" style={{color:'#8792a2'}}>Bank Loan — Kotak</p>
              </div>
              <div className="space-y-1">{[{l:'Amount',k:'amount',r:fmt},{l:'Interest',k:'rate',r:v=>v+'%'},{l:'Tenure',k:'tenure',r:v=>v+' mo'}].map(f=><div key={f.k} className="flex justify-between items-center"><span className="text-[14px]" style={{color:'#3c4257'}}>{f.l}</span><E value={bl[f.k]} onSave={v=>setBl(p=>({...p,[f.k]:v}))} type="number" render={f.r} cls="tabular-nums text-[14px] font-medium" iCls="w-28 text-right"/></div>)}</div>
              <div className="flex justify-between items-center mt-2 pt-2" style={{borderTop:'1px solid #f0f2f5'}}><span className="text-[14px]" style={{color:'#8792a2'}}>EMI</span><span className="text-[14px] font-semibold tabular-nums" style={{color:'#1a1f36'}}>{fmt(bankEmi)}</span></div>
              <p className="text-[12px] mt-1.5" style={{color:'#8792a2'}}>Interest: {fmt(bankEmi*bl.tenure-bl.amount)} | Cleared by {(()=>{const d=new Date();d.setMonth(d.getMonth()+bl.tenure);return d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})})()}</p>
            </div>
            <div className="px-4 py-3.5">
              <div className="flex items-center gap-2 mb-2.5">
                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#697386" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.63 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>
                <p className="text-[12px] font-medium uppercase tracking-wider" style={{color:'#8792a2'}}>Japan Trip 2027</p>
              </div>
              <div className="flex justify-between items-center mb-2"><span className="text-[14px]" style={{color:'#3c4257'}}>Target</span><E value={japan} onSave={setJapan} type="number" render={fmt} cls="tabular-nums text-[14px] font-medium" iCls="w-28 text-right"/></div>
              <div className="h-1 rounded-full overflow-hidden mb-1.5" style={{background:'#e3e8ee'}}><div className="h-full rounded-full transition-all duration-500" style={{width:`${surplus>0?Math.min(surplus/japan*100,100):0}%`,background:surplus>0?'#3ecf8e':'#c1c9d2'}}/></div>
              {japanMo?<p className="text-[12px]" style={{color:'#8792a2'}}>At {fmt(surplus)}/mo, reachable in {japanMo} months ({(()=>{const d=new Date();d.setMonth(d.getMonth()+japanMo);return d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})})()})</p>
                :<p className="text-[12px]" style={{color:'#e56f4a'}}>No surplus available for savings</p>}
            </div>
          </div>
        </div>
      </div>

    </main>

    {/* ═══ COMMAND BAR / MIC ═══ */}
    {cmdOpen
      ?<div className="fixed bottom-0 inset-x-0 z-[60] pb-5 px-4 flex justify-center" style={{background:'linear-gradient(transparent,rgba(255,255,255,.97) 40%)'}}>
        <div className="cmd-bar max-w-lg w-full flex items-center gap-3 pl-3 pr-2 py-2" style={{background:'#fff',borderRadius:8,border:'1px solid #e3e8ee',boxShadow:'0 4px 16px rgba(0,0,0,.08)'}}>
          <button onClick={toggleListen} className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 relative ${isListening?'mic-ring':''}`}
            style={{backgroundColor:isListening?'#635bff':'#f0f2f5',color:isListening?'white':'#697386',transition:'background .15s'}} aria-label={isListening?'Stop listening':'Start listening'}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.6} strokeLinecap="round" strokeLinejoin="round" style={{width:16,height:16}}>
              <path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
            </svg>
          </button>
          {cmdResult
            ?<p className="flex-1 text-[13px] font-medium fade-in" style={{color:cmdResult.ok?'#3ecf8e':'#e8b73a'}} role="status" aria-live="assertive">{cmdResult.ok?'Done: ':''}{cmdResult.msg}</p>
            :<input ref={cmdRef} value={cmdText} onChange={e=>{setCmdText(e.target.value);setCmdResult(null)}} onKeyDown={handleCmdKey}
              placeholder={isListening?'Listening...':'Type a command — "add catering 50000"'}
              className="flex-1 text-[13px] outline-none bg-transparent placeholder:text-[#c1c9d2]" style={{color:'#1a1f36'}} aria-label="Command input"/>
          }
          <div className="flex items-center gap-1 shrink-0">
            {!cmdResult&&cmdText&&<button onClick={()=>runCmd(cmdText)} className="text-[12px] font-medium px-2 py-1 rounded" style={{color:'#635bff',background:'#f5f3ff'}} aria-label="Run command">Run</button>}
            <button onClick={closeCmd} className="w-6 h-6 rounded flex items-center justify-center" style={{color:'#c1c9d2',transition:'color .12s'}}
              onMouseOver={e=>e.currentTarget.style.color='#697386'} onMouseOut={e=>e.currentTarget.style.color='#c1c9d2'} aria-label="Close command bar">
              <svg viewBox="0 0 20 20" fill="currentColor" style={{width:13,height:13}}><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
            </button>
          </div>
        </div>
      </div>
      :<button onClick={openCmd} className="fixed bottom-5 right-5 z-[60] w-10 h-10 rounded-full flex items-center justify-center"
          style={{backgroundColor:'#635bff',boxShadow:'0 2px 8px rgba(99,91,255,.3)',transition:'transform .15s ease'}}
          onMouseOver={e=>e.currentTarget.style.transform='scale(1.06)'}
          onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}
          aria-label="Open command bar (⌘K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round" style={{width:18,height:18}}>
            <path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
          </svg>
        </button>
    }

      {toasts.length>0&&<div className="fixed top-14 right-5 z-[100] flex flex-col gap-2 pointer-events-none" style={{maxWidth:340}}>
        {toasts.map(t=>{
          const icons={add:'#3ecf8e',remove:'#e56f4a',nest:'#635bff',detach:'#e8b73a',info:'#697386'};
          const ic=icons[t.type]||icons.info;
          return<div key={t.id} className={`pointer-events-auto flex items-center gap-2.5 px-3.5 py-2.5 rounded-md ${t.exit?'toast-exit':'toast-enter'}`}
            style={{background:'#fff',border:'1px solid #e3e8ee',boxShadow:'0 2px 8px rgba(0,0,0,.06)'}}>
            <div className="w-5 h-5 rounded flex items-center justify-center shrink-0" style={{backgroundColor:ic+'14'}}>
              {t.type==='add'&&<svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill={ic}><path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"/></svg>}
              {t.type==='remove'&&<svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill={ic}><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"/></svg>}
              {t.type==='nest'&&<svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill={ic}><path fillRule="evenodd" d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10zm6 5.25a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5a.75.75 0 01-.75-.75z" clipRule="evenodd"/></svg>}
              {t.type==='detach'&&<svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill={ic}><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>}
              {t.type==='info'&&<svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill={ic}><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" clipRule="evenodd"/></svg>}
            </div>
            <span className="text-[13px] font-medium flex-1" style={{color:'#1a1f36'}}>{t.msg}</span>
            <button onClick={()=>dismissToast(t.id)} className="w-4 h-4 flex items-center justify-center rounded shrink-0 transition hover:bg-gray-100" style={{color:'#c1c9d2'}}>
              <svg className="w-3 h-3" viewBox="0 0 20 20" fill="currentColor"><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
            </button>
          </div>
        })}
      </div>}
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
