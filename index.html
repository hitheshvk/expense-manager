/* ── Safe math expression evaluator ── */
function evalMath(expr){
  const s=String(expr).replace(/,/g,'').replace(/₹/g,'').trim();
  if(!s)return NaN;
  if(/^[\d.]+$/.test(s))return parseFloat(s);
  if(!/^[\d\s+\-*/.()]+$/.test(s))return NaN;
  try{return Function('"use strict";return('+s+')')()}catch(e){return NaN}
}

/* ── Editable Field ── */
function E({value,onSave,type='text',options,render,ph,cls='',iCls=''}){
  const[on,setOn]=useState(false);const[d,setD]=useState(value);const ref=useRef(null);
  useEffect(()=>{if(!on)setD(value)},[value,on]);
  useEffect(()=>{if(on&&ref.current){ref.current.focus();if(ref.current.select&&type!=='select')ref.current.select()}},[on]);
  const save=()=>{
    if(type==='number'){const v=Math.max(0,Math.round(evalMath(d))||0);if(v!==value)onSave(v);setOn(false);return}
    const v=(d??'').toString();if(v!==value)onSave(v);setOn(false);
  };
  if(!on){const disp=render?render(value):(value===''||value==null?(ph||'—'):String(value));return<span role="button" tabIndex={0} onClick={()=>{setD(value);setOn(true)}} onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setD(value);setOn(true)}}} className={`cursor-pointer border-b border-dashed border-transparent hover:border-[#8898aa] inline-block ${cls}`} style={{transition:'border-color .15s ease, color .15s ease'}} aria-label={`Edit ${ph||'value'}: ${value}`}>{disp}</span>}
  if(type==='select')return<select ref={ref} value={d} onChange={e=>{onSave(e.target.value);setOn(false)}} onBlur={()=>setOn(false)} className={`border rounded-md px-2.5 py-1 text-[14px] bg-white focus:outline-none focus:ring-2 focus:ring-[#635bff]/30 focus:border-[#635bff] fade-in ${iCls}`} style={{borderColor:'#d8dee4'}}>{(options||[]).map(o=><option key={o} value={o}>{o||'—'}</option>)}</select>;
  return<input ref={ref} type="text" inputMode={type==='number'?'decimal':'text'} value={d} onChange={e=>setD(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setD(value);setOn(false)}}} placeholder={type==='number'?'e.g. 50000+30000':(ph||'')} className={`border rounded-md px-2.5 py-1 text-[14px] bg-white focus:outline-none focus:ring-2 focus:ring-[#635bff]/30 focus:border-[#635bff] fade-in ${iCls}`} style={{borderColor:'#d8dee4'}}/>
}

/* ── Command Parser ── */
function parseCmd(raw){
  const t=raw.toLowerCase().replace(/[.,!?]+$/,'').trim();
  const xAmt=s=>{
    s=s.replace(/₹|rupees?|rs\.?/gi,'').replace(/,/g,'');
    let m;
    if(m=s.match(/([\d.]+)\s*(?:lakh|lakhs|lac)/i))return Math.round(parseFloat(m[1])*1e5);
    if(m=s.match(/([\d.]+)\s*(?:thousand|k)\b/i))return Math.round(parseFloat(m[1])*1e3);
    const ns=[...s.matchAll(/\d[\d.]*/g)];
    if(ns.length)return Math.round(parseFloat(ns[ns.length-1][0]));
    return null;
  };
  const strip=s=>s.replace(/₹|rupees?|rs\.?/gi,'').replace(/\d[\d,.]*\s*(?:lakh|lakhs|lac|thousand|k)?\s*/gi,'').replace(/\b(for|of|at|to|in|the|a|an)\b/gi,'').replace(/\s+/g,' ').trim();

  if(/^(add|new|create)\s/i.test(t)){
    const rest=t.replace(/^(add|new|create)\s+/i,'');
    const amt=xAmt(rest);const name=strip(rest);
    const cat=CATS.find(c=>rest.includes(c.toLowerCase()))||'Other';
    return{action:'add',name,cost:amt||0,cat};
  }
  if(/^(paid|pay)\s/i.test(t)||(/\bmark\b/i.test(t)&&/\bpaid\b/i.test(t))){
    if(/\bmark\b/i.test(t)&&/\bpaid\b/i.test(t))
      return{action:'markPaid',name:t.replace(/\bmark\b/i,'').replace(/\bas\s+paid\b/i,'').replace(/\bpaid\b/i,'').replace(/\b(the|a|an)\b/gi,'').trim()};
    const amt=xAmt(t);const name=strip(t.replace(/^(paid|pay)\s+/i,''));
    return{action:'paid',name,amount:amt};
  }
  if(/^(remove|delete)\s/i.test(t))return{action:'remove',name:t.replace(/^(remove|delete)\s+/i,'').replace(/\b(the|a|an)\b/gi,'').trim()};
  if(/^group\s/i.test(t)){
    const parts=t.replace(/^group\s+/i,'').split(/\s+with\s+/i);
    if(parts.length===2)return{action:'group',nameA:parts[0].trim(),nameB:parts[1].trim()};
    return{action:'unknown',text:t};
  }
  if(/^ungroup\s/i.test(t))return{action:'ungroup',name:t.replace(/^ungroup\s+/i,'').replace(/\b(the|a|an)\b/gi,'').trim()};
  if(/^(set|change|update)\s/i.test(t)){
    const amt=xAmt(t);const field=t.replace(/^(set|change|update)\s+/i,'').replace(/\s+(to|at)\s+.*/i,'').trim();
    return{action:'set',field,amount:amt};
  }
  const amt=xAmt(t);
  if(amt&&amt>0){const name=strip(t);if(name)return{action:'add',name,cost:amt,cat:'Other'}}
  return{action:'unknown',text:t};
}

function App(){
  const[items,setItems]=useP('items',SEED);
  const[filter,setFilter]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  const[del,setDel]=useState(null);
  const[nw,setNw]=useState({name:'',cost:'',paid:'',cat:'Other',src:''});
  
  const addRef=useRef(null);
  const[cf,setCf]=useP('cf',{income:180000,rent:17500,sendHome:10000,homeLoanEmi:16000,living:30000,sip:22000});
  const[fl,setFl]=useP('fl',{outstanding:250000,repay:25000});
  const[bl,setBl]=useP('bl',{amount:900000,rate:11,tenure:24});
  const[japan,setJapan]=useP('japan',400000);
  const[groups,setGroups]=useP('groups',[]);
  const[showDataMenu,setShowDataMenu]=useState(false);
  const[dragId,setDragId]=useState(null);
  const[dropTarget,setDropTarget]=useState(null);

  const upd=(id,k,v)=>setItems(p=>p.map(i=>i.id===id?{...i,[k]:v}:i));
  const rm=id=>{setItems(p=>p.filter(i=>i.id!==id));setDel(null);setGroups(g=>g.map(gr=>({...gr,itemIds:gr.itemIds.filter(x=>x!==id)})).filter(gr=>gr.itemIds.length>0))};
  const add=()=>{if(!nw.name.trim()||!nw.cost)return;const id=Math.max(0,...items.map(i=>i.id))+1;setItems(p=>[...p,{id,cat:nw.cat,name:nw.name.trim(),cost:Math.round(evalMath(nw.cost))||0,paid:Math.round(evalMath(nw.paid))||0,src:nw.src,notes:''}]);setNw({name:'',cost:'',paid:'',cat:'Other',src:''});setShowAdd(false)};

  const groupOfItem=id=>groups.find(g=>g.itemIds.includes(id));
  const createGroup=(idA,idB)=>{
    const gid='g'+Date.now();
    setGroups(p=>{
      const clean=p.map(g=>({...g,itemIds:g.itemIds.filter(x=>x!==idA&&x!==idB)})).filter(g=>g.itemIds.length>0);
      return[...clean,{id:gid,name:'New Group',itemIds:[idA,idB]}];
    });
  };
  const addToGroup=(gid,itemId)=>{
    setGroups(p=>p.map(g=>g.itemIds.includes(itemId)?{...g,itemIds:g.itemIds.filter(x=>x!==itemId)}:g).filter(g=>g.itemIds.length>0).map(g=>g.id===gid&&!g.itemIds.includes(itemId)?{...g,itemIds:[...g.itemIds,itemId]}:g));
  };
  const removeFromGroup=(gid,itemId)=>{
    setGroups(p=>p.map(g=>g.id===gid?{...g,itemIds:g.itemIds.filter(x=>x!==itemId)}:g).filter(g=>g.itemIds.length>1));
  };
  const renameGroup=(gid,name)=>setGroups(p=>p.map(g=>g.id===gid?{...g,name}:g));
  const dissolveGroup=gid=>setGroups(p=>p.filter(g=>g.id!==gid));

  const bankEmi=useMemo(()=>Math.round(calcEMI(bl.amount,bl.rate,bl.tenure)),[bl]);
  const fixedTotal=cf.rent+cf.sendHome+cf.homeLoanEmi+cf.living;
  const surplus=cf.income-fixedTotal-cf.sip-bankEmi-fl.repay;
  const friendMo=fl.repay>0?Math.ceil(fl.outstanding/fl.repay):null;
  const japanMo=surplus>0?Math.ceil(japan/surplus):null;
  const countdown=useMemo(()=>{const d=new Date('2026-04-29')-new Date();return d<=0?0:Math.ceil(d/864e5)},[]);

  const t=useMemo(()=>{const b=items.reduce((s,i)=>s+i.cost,0);const p=items.reduce((s,i)=>s+i.paid,0);return{b,p,pend:b-p,paid_n:items.filter(i=>i.paid>=i.cost).length,partial_n:items.filter(i=>i.paid>0&&i.paid<i.cost).length,pending_n:items.filter(i=>i.paid===0).length}},[items]);
  const byCat=useMemo(()=>{const m={};items.forEach(i=>{if(!m[i.cat])m[i.cat]={cost:0,paid:0};m[i.cat].cost+=i.cost;m[i.cat].paid+=i.paid});return Object.entries(m).sort((a,b)=>b[1].cost-a[1].cost)},[items]);
  const maxCat=byCat.length>0?byCat[0][1].cost:1;
  const filtered=useMemo(()=>{if(filter==='all')return items;return items.filter(i=>{if(filter==='paid')return i.paid>=i.cost;if(filter==='partial')return i.paid>0&&i.paid<i.cost;if(filter==='pending')return i.paid===0})},[items,filter]);
  const pct=t.b>0?t.p/t.b*100:0;

  const filteredIds=useMemo(()=>new Set(filtered.map(i=>i.id)),[filtered]);
  const tableRows=useMemo(()=>{
    const groupedIds=new Set(groups.flatMap(g=>g.itemIds));
    const rows=[];const emittedGroups=new Set();
    filtered.forEach(item=>{
      if(groupedIds.has(item.id)){
        const g=groups.find(gr=>gr.itemIds.includes(item.id));
        if(g&&!emittedGroups.has(g.id)){
          emittedGroups.add(g.id);
          const children=g.itemIds.map(id=>items.find(i=>i.id===id)).filter(Boolean).filter(i=>filteredIds.has(i.id));
          if(children.length>0)rows.push({type:'group',group:g,children});
        }
      }else{
        rows.push({type:'item',item});
      }
    });
    return rows;
  },[filtered,groups,items,filteredIds]);

  const exportCSV=()=>{const h='Item,Category,Cost,Paid,Pending,Source,Notes\n';const rows=items.map(i=>`"${i.name}","${i.cat}",${i.cost},${i.paid},${Math.max(0,i.cost-i.paid)},"${i.src}","${i.notes}"`).join('\n');const b=new Blob([h+rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='wedding-budget.csv';a.click()};

  const exportJSON=()=>{
    const data={items,cf,fl,bl,japan,groups,exportedAt:new Date().toISOString()};
    const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`wedding-budget-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
    setShowDataMenu(false);
  };
  const importJSON=()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.items)setItems(d.items);if(d.cf)setCf(d.cf);if(d.fl)setFl(d.fl);if(d.bl)setBl(d.bl);if(d.japan!=null)setJapan(d.japan);if(d.groups)setGroups(d.groups);
        setShowDataMenu(false);alert('Data restored successfully');
      }catch(err){alert('Invalid backup file')}
    };r.readAsText(f)};inp.click();
  };
  const resetData=()=>{if(confirm('Reset all data to initial values? This cannot be undone.')){setItems(SEED);setCf({income:180000,rent:17500,sendHome:10000,homeLoanEmi:16000,living:30000,sip:22000});setFl({outstanding:250000,repay:25000});setBl({amount:900000,rate:11,tenure:24});setJapan(400000);setGroups([]);setShowDataMenu(false)}};

  const lastSaved=useMemo(()=>{try{return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}catch(e){return''}},[items,cf,fl,bl,japan,groups]);

  /* ── Voice / Command Bar ── */
  const[cmdOpen,setCmdOpen]=useState(false);
  const[cmdText,setCmdText]=useState('');
  const[cmdResult,setCmdResult]=useState(null);
  const[isListening,setIsListening]=useState(false);
  const recRef=useRef(null);const cmdRef=useRef(null);const dismissRef=useRef(null);

  const findItem=name=>{
    if(!name)return null;const n=name.toLowerCase();
    return items.find(i=>i.name.toLowerCase()===n)
      ||items.find(i=>i.name.toLowerCase().includes(n))
      ||items.find(i=>n.split(' ').filter(w=>w.length>2).some(w=>i.name.toLowerCase().includes(w)));
  };

  const execCmd=cmd=>{
    switch(cmd.action){
      case'add':{
        if(!cmd.name)return{msg:"Couldn't parse item name",ok:false};
        const id=Math.max(0,...items.map(i=>i.id))+1;
        const name=cmd.name.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
        setItems(p=>[...p,{id,cat:cmd.cat||'Other',name,cost:cmd.cost||0,paid:0,src:'',notes:''}]);
        return{msg:`Added "${name}" for ${fmt(cmd.cost||0)}`,ok:true};
      }
      case'paid':{
        const it=findItem(cmd.name);if(!it)return{msg:`Can't find "${cmd.name}"`,ok:false};
        const a=Math.min(cmd.amount||it.cost,it.cost);upd(it.id,'paid',a);
        return{msg:`Paid ${fmt(a)} for "${it.name}"`,ok:true};
      }
      case'markPaid':{
        const it=findItem(cmd.name);if(!it)return{msg:`Can't find "${cmd.name}"`,ok:false};
        upd(it.id,'paid',it.cost);return{msg:`Marked "${it.name}" as paid`,ok:true};
      }
      case'remove':{
        const it=findItem(cmd.name);if(!it)return{msg:`Can't find "${cmd.name}"`,ok:false};
        rm(it.id);return{msg:`Removed "${it.name}"`,ok:true};
      }
      case'set':{
        const fm={'rent':'rent','salary':'income','income':'income','send home':'sendHome','home loan':'homeLoanEmi','living':'living','sip':'sip','mutual fund':'sip'};
        const k=Object.keys(fm).find(k=>cmd.field?.includes(k));
        if(k&&cmd.amount){setCf(p=>({...p,[fm[k]]:cmd.amount}));return{msg:`Set ${k} to ${fmt(cmd.amount)}`,ok:true}}
        return{msg:`Couldn't understand "${cmd.field}"`,ok:false};
      }
      case'group':{
        const a=findItem(cmd.nameA),b=findItem(cmd.nameB);
        if(!a)return{msg:`Can't find "${cmd.nameA}"`,ok:false};
        if(!b)return{msg:`Can't find "${cmd.nameB}"`,ok:false};
        const eg=groupOfItem(b.id);
        if(eg)addToGroup(eg.id,a.id);else createGroup(a.id,b.id);
        return{msg:`Grouped "${a.name}" with "${b.name}"`,ok:true};
      }
      case'ungroup':{
        const it=findItem(cmd.name);
        if(it){const g=groupOfItem(it.id);if(g){removeFromGroup(g.id,it.id);return{msg:`Removed "${it.name}" from group`,ok:true}}}
        const g=groups.find(g=>g.name.toLowerCase().includes(cmd.name.toLowerCase()));
        if(g){dissolveGroup(g.id);return{msg:`Dissolved group "${g.name}"`,ok:true}}
        return{msg:`Can't find "${cmd.name}"`,ok:false};
      }
      default:return{msg:`Try "add catering 50000" or "group X with Y"`,ok:false};
    }
  };

  const stopListening=()=>{try{recRef.current?.stop()}catch(e){}setIsListening(false)};

  const startListening=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setCmdResult({msg:'Voice not supported — type a command instead',ok:false});return}
    const rec=new SR();rec.lang='en-IN';rec.interimResults=true;rec.continuous=false;recRef.current=rec;
    rec.onstart=()=>setIsListening(true);
    rec.onend=()=>setIsListening(false);
    rec.onerror=()=>setIsListening(false);
    rec.onresult=e=>{
      const tx=Array.from(e.results).map(r=>r[0].transcript).join('');
      setCmdText(tx);
      if(e.results[0].isFinal)runCmd(tx);
    };
    rec.start();
  };

  const openCmd=()=>{setCmdOpen(true);setCmdText('');setCmdResult(null);setTimeout(()=>{cmdRef.current?.focus();startListening()},120)};
  const closeCmd=()=>{stopListening();setCmdOpen(false);setCmdText('');setCmdResult(null);clearTimeout(dismissRef.current)};
  const toggleListen=()=>{if(isListening)stopListening();else startListening()};
  const runCmd=text=>{
    stopListening();const cmd=parseCmd(text);const res=execCmd(cmd);setCmdResult(res);
    if(res.ok){dismissRef.current=setTimeout(closeCmd,2800)}
  };
  const handleCmdKey=e=>{if(e.key==='Enter'&&cmdText.trim()){e.preventDefault();runCmd(cmdText.trim())}if(e.key==='Escape')closeCmd()};

  useEffect(()=>{
    const handler=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();if(cmdOpen)closeCmd();else openCmd()}};
    window.addEventListener('keydown',handler);return()=>window.removeEventListener('keydown',handler);
  },[cmdOpen]);

  useEffect(()=>{
    if(!showDataMenu)return;
    const h=e=>{if(!e.target.closest('[data-menu]'))setShowDataMenu(false)};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[showDataMenu]);

  return<div className="min-h-screen flex flex-col">

    {/* ═══ HEADER ═══ */}
    <header className="sc sticky top-0 z-50" style={{borderRadius:0,boxShadow:'0 1px 3px rgba(50,50,93,.08)'}}>
      <div className="max-w-[1140px] mx-auto flex items-center justify-between px-6 h-14">
        <div className="flex items-center gap-2.5">

        </div>
        <div className="flex items-center gap-4">
          <div className="relative" data-menu>
            <button onClick={()=>setShowDataMenu(p=>!p)} className="text-[13px] font-medium hidden sm:flex items-center gap-1 transition hover:opacity-80" style={{color:'#635bff'}} aria-label="Data management menu">
              Data <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 4l3 3 3-3z"/></svg>
            </button>
            {showDataMenu&&<div className="absolute right-0 top-8 bg-white rounded-lg shadow-lg border py-1 z-50 w-48 fade-in" style={{borderColor:'#e3e8ee'}}>
              <button onClick={exportCSV} className="w-full text-left px-3 py-2 text-[13px] hover:bg-gray-50 transition" style={{color:'#0a2540'}}>Export CSV</button>
              <button onClick={exportJSON} className="w-full text-left px-3 py-2 text-[13px] hover:bg-gray-50 transition" style={{color:'#0a2540'}}>Backup (JSON)</button>
              <button onClick={importJSON} className="w-full text-left px-3 py-2 text-[13px] hover:bg-gray-50 transition" style={{color:'#0a2540'}}>Restore Backup</button>
              <hr className="my-1" style={{borderColor:'#e3e8ee'}}/>
              <button onClick={resetData} className="w-full text-left px-3 py-2 text-[13px] transition" style={{color:'#cd3d64'}}>Reset to Defaults</button>
            </div>}
          </div>
          <span className="text-[12px] hidden sm:block" style={{color:'#8898aa'}}>auto-saved {lastSaved}</span>
          <span className="text-[13px] hidden sm:block" style={{color:'#8898aa'}}>Apr 29, 2026</span>
          <span className="text-[13px] font-bold text-white rounded-full px-2.5 py-1 tabular-nums" style={{backgroundColor:'#0a2540'}} aria-label={`${countdown} days until wedding`}>{countdown}d</span>
        </div>
      </div>

    <main className="flex-1 max-w-[1140px] w-full mx-auto px-6 py-8 space-y-7">

      {/* ═══ HERO ═══ */}

        <div className="p-7 sm:p-9 relative">

                <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="2.8"/>
                <circle cx="18" cy="18" r="15" fill="none" stroke="url(#rg)" strokeWidth="2.8" strokeLinecap="round"
                  strokeDasharray={`${pct*.942} ${94.2-pct*.942}`} style={{filter:'drop-shadow(0 0 8px rgba(99,91,255,0.5))'}}/>
                <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#635bff"/><stop offset="100%" stopColor="#00d4ff"/></linearGradient></defs>
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-[34px] font-extrabold tabular-nums leading-none">{pct.toFixed(0)}%</span>
                <span className="text-[12px] uppercase tracking-[0.2em] mt-1" style={{color:'rgba(255,255,255,0.35)'}}>paid</span>
              </div>
            </div>

            {/* Center */}
            <div className="flex-1 text-center sm:text-left">
              <p className="text-[13px] uppercase tracking-[0.2em] mb-2" style={{color:'rgba(255,255,255,0.3)'}}>Total Wedding Budget</p>
              <p className="text-4xl sm:text-[44px] font-extrabold tabular-nums tracking-tight leading-none">{fmt(t.b)}</p>
              <div className="flex flex-wrap justify-center sm:justify-start gap-x-6 mt-4">

                  <span className="w-2 h-2 rounded-full" style={{backgroundColor:'#34d399'}}/>Paid <span className="font-semibold text-white/80">{fmt(t.p)}</span>
                </span>

                  <span className="w-2 h-2 rounded-full" style={{backgroundColor:'rgba(255,255,255,0.15)'}}/>Pending <span className="font-semibold text-white/80">{fmt(t.pend)}</span>
                </span>
              </div>
            </div>

            {/* Calendar Countdown */}

              <Cal days={countdown}/>

              {t.paid_n>0&&<div className="transition-all duration-700" style={{width:`${t.paid_n/items.length*100}%`,backgroundColor:'#34d399'}}/>}
              {t.partial_n>0&&<div className="transition-all duration-700" style={{width:`${t.partial_n/items.length*100}%`,backgroundColor:'#fbbf24'}}/>}

                <td className="py-3.5 pr-5 pl-3 text-right">{del===item.id
                  ?<span className="inline-flex gap-1.5 text-[12px] whitespace-nowrap"><button onClick={()=>rm(item.id)} className="font-semibold" style={{color:'#df1b41'}}>Yes</button><span style={{color:'#c1c9d2'}}>/</span><button onClick={()=>setDel(null)} style={{color:'#8898aa'}}>No</button></span>
                  :<button onClick={()=>setDel(item.id)} className="opacity-0 group-hover:opacity-100 focus:opacity-100" style={{color:'#c1c9d2',transition:'opacity .2s ease, color .15s ease'}} onMouseOver={e=>e.currentTarget.style.color='#df1b41'} onMouseOut={e=>e.currentTarget.style.color='#c1c9d2'} aria-label={`Delete ${item.name}`}>
                    <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"/></svg>
                  </button>}</td>
              </tr>
            })}
            </tbody>
            <tfoot><tr className="font-semibold" style={{borderTop:'2px solid rgba(50,50,93,.1)',backgroundColor:'#fafbfc',color:'#0a2540'}}>
              <td className="py-3 pl-2"></td>
              <td className="py-3 pl-1 pr-3">Total ({filtered.length})</td>
              <td className="hidden sm:table-cell"></td>
              <td className="text-right py-3 px-3 tabular-nums">{fmt(filtered.reduce((s,i)=>s+i.cost,0))}</td>
              <td className="text-right py-3 px-3 tabular-nums" style={{color:'#0ea47a'}}>{fmt(filtered.reduce((s,i)=>s+i.paid,0))}</td>
              <td className="text-right py-3 px-3 tabular-nums" style={{color:'#df1b41'}}>{fmt(filtered.reduce((s,i)=>s+Math.max(0,i.cost-i.paid),0))}</td>
              <td colSpan={2}></td>
            </tr></tfoot>
          </table>
        </div>
      </div>
      <p className="text-[13px] text-center -mt-3" style={{color:'#c1c9d2'}}>Drag rows onto each other to group &middot; Click any value to edit &middot; <kbd className="px-1.5 py-0.5 rounded text-[11px] font-medium" style={{backgroundColor:'#edf0f3',color:'#8898aa'}}>⌘K</kbd> voice commands</p>

      {/* ═══ FINANCES ═══ */}
      <p className="text-[13px] font-semibold uppercase tracking-[0.1em] pt-2" style={{color:'#8898aa'}}>Cash Flow, Loans & Goals</p>
      <div className="grid lg:grid-cols-2 gap-6 -mt-1">
        <div className="sc overflow-hidden">
          <div className="px-5 py-3.5" style={{borderBottom:'1px solid rgba(50,50,93,.08)',backgroundColor:'#fafbfc'}}><p className="text-[13px] font-semibold uppercase tracking-[0.1em]" style={{color:'#8898aa'}}>Monthly Cash Flow</p></div>
          <div>
            <div className="flex justify-between items-center py-3.5 px-5" style={{borderBottom:'1px solid rgba(50,50,93,.05)'}}>
              <span className="text-[15px]" style={{color:'#425466'}}>Salary</span>
              <E value={cf.income} onSave={v=>setCf(p=>({...p,income:v}))} type="number" render={v=><span className="font-medium" style={{color:'#0ea47a'}}>{fmt(v)}</span>} cls="tabular-nums text-[15px]" iCls="w-32 text-right"/>
            </div>
            {[{l:'Rent',k:'rent'},{l:'Send Home',k:'sendHome'},{l:'Home Loan EMI',k:'homeLoanEmi'},{l:'Living Expenses',k:'living'},{l:'Mutual Fund SIP',k:'sip'}].map(r=>
              <div key={r.k} className="flex justify-between items-center py-3.5 px-5" style={{borderBottom:'1px solid rgba(50,50,93,.05)'}}>
                <span className="text-[15px]" style={{color:'#425466'}}>{r.l}</span>
                <E value={cf[r.k]} onSave={v=>setCf(p=>({...p,[r.k]:v}))} type="number" render={v=><span style={{color:'#425466'}}>-{fmt(v)}</span>} cls="tabular-nums text-[15px]" iCls="w-32 text-right"/>
              </div>
            )}
            <div className="flex justify-between items-center py-3.5 px-5" style={{borderBottom:'1px solid rgba(50,50,93,.05)'}}>
              <span className="text-[15px]" style={{color:'#8898aa'}}>Bank Loan EMI</span>
              <span className="text-[15px] tabular-nums" style={{color:'#8898aa'}}>-{fmt(bankEmi)}</span>
            </div>
            <div className="flex justify-between items-center py-3.5 px-5" style={{borderBottom:'1px solid rgba(50,50,93,.05)'}}>
              <span className="text-[15px]" style={{color:'#8898aa'}}>Friend Loan Repay</span>
              <span className="text-[15px] tabular-nums" style={{color:'#8898aa'}}>-{fmt(fl.repay)}</span>
            </div>
            <div className="flex justify-between items-center py-4 px-5" style={{backgroundColor:surplus>=0?'#f0fdf4':'#fef2f2'}}>
              <span className="text-[15px] font-semibold" style={{color:'#0a2540'}}>Net Surplus</span>
              <span className="text-[22px] font-bold tabular-nums" style={{color:surplus>=0?'#0ea47a':'#df1b41'}}>{fmt(surplus)}</span>
            </div>
          </div>
        </div>

        <div className="sc overflow-hidden">
          <div className="px-5 py-3.5" style={{borderBottom:'1px solid rgba(50,50,93,.08)',backgroundColor:'#fafbfc'}}><p className="text-[13px] font-semibold uppercase tracking-[0.1em]" style={{color:'#8898aa'}}>Debt & Savings Goals</p></div>
          <div className="px-5 py-4" style={{borderBottom:'1px solid rgba(50,50,93,.05)'}}>
            <div className="flex items-center gap-2.5 mb-3"><D3 g={G.red} d={PI.hourglass} sz={28}/><p className="text-[13px] font-semibold uppercase tracking-[0.08em]" style={{color:'#8898aa'}}>Friend Loan — Nishal</p></div>
            <div className="flex justify-between items-center mb-1.5"><span className="text-[15px]" style={{color:'#425466'}}>Outstanding</span><E value={fl.outstanding} onSave={v=>setFl(p=>({...p,outstanding:v}))} type="number" render={v=><span className="font-medium" style={{color:'#df1b41'}}>{fmt(v)}</span>} cls="tabular-nums text-[15px]" iCls="w-32 text-right"/></div>
            <div className="flex justify-between items-center mb-1.5"><span className="text-[15px]" style={{color:'#425466'}}>Repay / month</span><E value={fl.repay} onSave={v=>setFl(p=>({...p,repay:v}))} type="number" render={fmt} cls="tabular-nums text-[15px] font-medium" iCls="w-32 text-right"/></div>
            {friendMo&&<p className="text-[13px] mt-2" style={{color:'#8898aa'}}>Cleared in {friendMo} months ({(()=>{const d=new Date();d.setMonth(d.getMonth()+friendMo);return d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})})()})</p>}
          </div>
          <div className="px-5 py-4" style={{borderBottom:'1px solid rgba(50,50,93,.05)'}}>
            <div className="flex items-center gap-2.5 mb-3"><D3 g={G.violet} d={PI.banknotes} sz={28}/><p className="text-[13px] font-semibold uppercase tracking-[0.08em]" style={{color:'#8898aa'}}>Bank Loan — Kotak</p></div>
            <div className="space-y-1.5">{[{l:'Amount',k:'amount',r:fmt},{l:'Interest',k:'rate',r:v=>v+'%'},{l:'Tenure',k:'tenure',r:v=>v+' mo'}].map(f=><div key={f.k} className="flex justify-between items-center"><span className="text-[15px]" style={{color:'#425466'}}>{f.l}</span><E value={bl[f.k]} onSave={v=>setBl(p=>({...p,[f.k]:v}))} type="number" render={f.r} cls="tabular-nums text-[15px] font-medium" iCls="w-32 text-right"/></div>)}</div>
            <div className="flex justify-between items-center mt-2.5 pt-2.5" style={{borderTop:'1px solid rgba(50,50,93,.06)'}}><span className="text-[15px]" style={{color:'#8898aa'}}>EMI</span><span className="text-[15px] font-semibold tabular-nums" style={{color:'#0a2540'}}>{fmt(bankEmi)}</span></div>
            <p className="text-[13px] mt-2" style={{color:'#8898aa'}}>Interest: {fmt(bankEmi*bl.tenure-bl.amount)} | Cleared by {(()=>{const d=new Date();d.setMonth(d.getMonth()+bl.tenure);return d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})})()}</p>
          </div>
          <div className="px-5 py-4">
            <div className="flex items-center gap-2.5 mb-3"><D3 g={G.teal} d={PI.rocket} sz={28}/><p className="text-[13px] font-semibold uppercase tracking-[0.08em]" style={{color:'#8898aa'}}>Japan Trip 2027</p></div>
            <div className="flex justify-between items-center mb-2.5"><span className="text-[15px]" style={{color:'#425466'}}>Target</span><E value={japan} onSave={setJapan} type="number" render={fmt} cls="tabular-nums text-[15px] font-medium" iCls="w-32 text-right"/></div>
            <div className="h-[5px] rounded-full overflow-hidden mb-2" style={{backgroundColor:'#f0f2f5'}}><div className="h-full rounded-full transition-all duration-500" style={{width:`${surplus>0?Math.min(surplus/japan*100,100):0}%`,backgroundColor:surplus>0?'#2dd4bf':'#c1c9d2'}}/></div>
            {japanMo?<p className="text-[13px]" style={{color:'#8898aa'}}>At {fmt(surplus)}/mo, reachable in {japanMo} months ({(()=>{const d=new Date();d.setMonth(d.getMonth()+japanMo);return d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})})()})</p>
              :<p className="text-[13px]" style={{color:'#df1b41'}}>No surplus available for savings</p>}
          </div>
        </div>
      </div>

    </main>

    {/* ═══ COMMAND BAR / MIC ═══ */}
    {cmdOpen
      ?<div className="fixed bottom-0 inset-x-0 z-[60] pb-5 px-4 flex justify-center" style={{background:'linear-gradient(transparent,rgba(246,249,252,.97) 40%)'}}>
        <div className="sc cmd-bar max-w-lg w-full flex items-center gap-3 pl-3 pr-2 py-2.5" style={{boxShadow:'0 0 0 1px rgba(50,50,93,.08),0 8px 24px -4px rgba(50,50,93,.2),0 4px 12px -4px rgba(0,0,0,.12)'}}>
          <button onClick={toggleListen} className={`w-9 h-9 rounded-full flex items-center justify-center shrink-0 relative ${isListening?'mic-ring':''}`}
            style={{backgroundColor:isListening?'#635bff':'#f0f2f5',color:isListening?'white':'#8898aa',transition:'background .2s'}} aria-label={isListening?'Stop listening':'Start listening'}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.6} strokeLinecap="round" strokeLinejoin="round" style={{width:18,height:18}}>
              <path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
            </svg>
          </button>
          {cmdResult
            ?<p className="flex-1 text-[14px] font-medium fade-in" style={{color:cmdResult.ok?'#0ea47a':'#d97706'}} role="status" aria-live="assertive">{cmdResult.ok?'✓ ':''}{cmdResult.msg}</p>
            :<input ref={cmdRef} value={cmdText} onChange={e=>{setCmdText(e.target.value);setCmdResult(null)}} onKeyDown={handleCmdKey}
              placeholder={isListening?'Listening...':'Type a command — "add catering 50000"'}
              className="flex-1 text-[14px] outline-none bg-transparent placeholder:text-[#c1c9d2]" style={{color:'#0a2540'}} aria-label="Command input"/>
          }
          <div className="flex items-center gap-1 shrink-0">
            {!cmdResult&&cmdText&&<button onClick={()=>runCmd(cmdText)} className="text-[13px] font-semibold px-2 py-1 rounded" style={{color:'#635bff',backgroundColor:'#f5f3ff'}} aria-label="Run command">Run</button>}
            <button onClick={closeCmd} className="w-7 h-7 rounded-md flex items-center justify-center" style={{color:'#c1c9d2',transition:'color .15s'}}
              onMouseOver={e=>e.currentTarget.style.color='#8898aa'} onMouseOut={e=>e.currentTarget.style.color='#c1c9d2'} aria-label="Close command bar">
              <svg viewBox="0 0 20 20" fill="currentColor" style={{width:14,height:14}}><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
            </button>
          </div>
        </div>
        <p className="absolute bottom-1 text-[12px] tabular-nums" style={{color:'#c1c9d2'}}>
          <kbd className="px-1.5 py-0.5 rounded text-[11px] font-medium" style={{backgroundColor:'#edf0f3',color:'#8898aa'}}>⌘K</kbd>
        </p>
      </div>
      :<button onClick={openCmd} className="fixed bottom-6 right-6 z-[60] w-12 h-12 rounded-full flex items-center justify-center group"
          style={{backgroundColor:'#635bff',boxShadow:'0 4px 14px -2px rgba(99,91,255,.45),0 2px 6px rgba(0,0,0,.1)',transition:'transform .2s ease, box-shadow .2s ease'}}
          onMouseOver={e=>{e.currentTarget.style.transform='scale(1.08)';e.currentTarget.style.boxShadow='0 6px 20px -2px rgba(99,91,255,.5),0 3px 8px rgba(0,0,0,.12)'}}
          onMouseOut={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 14px -2px rgba(99,91,255,.45),0 2px 6px rgba(0,0,0,.1)'}}
          aria-label="Open command bar (⌘K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round" style={{width:22,height:22}}>
            <path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
          </svg>
        </button>
    }
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
